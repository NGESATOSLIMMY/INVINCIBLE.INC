<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RETALIATE | Strike</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<a href="index.html" class="logo">
RETALIATE<span>.</span>
</a>

</header>

<section class="hero">

<h1>STRIKE.</h1>

<p>Upload your report and expose corruption.</p>

</section>

<section class="container">

<form id="reportForm">

<input
  type="text"
  id="reportTitle"
  placeholder="Report title"
  required>

<select id="category" required>

<option value="">
Choose category
</option>

<option>
Corruption
</option>

<option>
Police Brutality
</option>

<option>
Infrastructure
</option>

<option>
Education
</option>

<option>
Health
</option>

</select>

<input
  type="text"
  id="location"
  placeholder="Location"
  required>

<textarea
  id="description"
  rows="6"
  placeholder="Describe the incident..."
  required>
</textarea>

<input
  type="text"
  id="reporter"
  placeholder="Your name (optional)">

<input
  type="file"
  id="fileInput"
  accept="image/*,video/*">

<div>

<label>
<input
  type="radio"
  name="urgency"
  value="Low">

Low
</label>

<label>
<input
  type="radio"
  name="urgency"
  value="Medium"
  checked>

Medium
</label>

<label>
<input
  type="radio"
  name="urgency"
  value="High">

High
</label>

</div>

<button type="submit">

FILE STRIKE 

</button>

</form>

</section>

<script src="script.js"></script>

</body>
</html>
